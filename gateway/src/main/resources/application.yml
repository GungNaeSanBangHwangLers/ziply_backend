server:
  port: 8080

spring:
  application:
    name: ziply-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader

        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader

        - id: review-service
          uri: http://review-service:8080
          predicates:
            - Path=/api/v1/review/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader

        - id: analysis-service
          uri: http://analysis-service:8080
          predicates:
            - Path=/api/v1/analysis/**
          filters:
            - StripPrefix=0
            - PreserveHostHeader

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG

jwt:
  secret: ${JWT_SECRET}