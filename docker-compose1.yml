version: "3.8"

services:
  # 1. 인프라 레이어 (기존과 동일)
  ziply-mysql:
    image: mysql:8.0
    container_name: ziply-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "ziply_master_pw"
      MYSQL_DATABASE: "ziply_main"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 2. 서비스 레이어 (Azure 경로를 삭제하고 로컬 build 경로로 수정)
  user-service:
    build: ./user  # [수정] Azure 이미지 대신 로컬 폴더 사용
    container_name: user-service
    restart: always
    depends_on:
      - ziply-mysql
      - kafka
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=aD93kLmT82vGrPq46WsYtN19BbFzQx7KpV21Rw9TfGh32Nd7HcLm92Qp3XvFt5
      - SPRING_DATASOURCE_URL=jdbc:mysql://ziply-mysql:3306/ziply_user?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ziply_master_pw
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  auth-service:
    build: ./auth  # [수정]
    container_name: auth-service
    restart: always
    depends_on:
      - ziply-mysql
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=aD93kLmT82vGrPq46WsYtN19BbFzQx7KpV21Rw9TfGh32Nd7HcLm92Qp3XvFt5
      - SPRING_DATASOURCE_URL=jdbc:mysql://ziply-mysql:3306/ziply_auth?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ziply_master_pw

  review-service:
    build: ./review  # [수정]
    container_name: review-service
    restart: always
    ports:
      - "8082:8080"
    depends_on:
      - ziply-mysql
      - kafka
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=aD93kLmT82vGrPq46WsYtN19BbFzQx7KpV21Rw9TfGh32Nd7HcLm92Qp3XvFt5
      - SPRING_DATASOURCE_URL=jdbc:mysql://ziply-mysql:3306/ziply_review?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ziply_master_pw
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  analysis-service:
    build: ./analysis  # [수정]
    container_name: analysis-service
    restart: always
    ports:
      - "8083:8080"
    depends_on:
      - ziply-mysql
      - kafka
      - review-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=aD93kLmT82vGrPq46WsYtN19BbFzQx7KpV21Rw9TfGh32Nd7HcLm92Qp3XvFt5
      - SPRING_DATASOURCE_URL=jdbc:mysql://ziply-mysql:3306/ziply_analysis?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ziply_master_pw
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - KAKAO_API_KEY=e204a5d7b17b627462ffb640491cab65
      - BUS_API_KEY=4e7670676763636837376d73707279
      - SEOUL_TRAFFIC_API_KEY=6852466a4663636839344f714e6f76
      - BUS_LOCATION_DATA_PATH=/app/resources/seoulBusPosition.json.gz
      - BUS_LOCATION_DATA_PATH1=/app/resources/seoulBusCount.json
      - SERVICES_REVIEW_URL=http://review-service:8080

  gateway:
    build: ./gateway  # [수정]
    container_name: gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - auth-service
      - review-service
      - analysis-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=aD93kLmT82vGrPq46WsYtN19BbFzQx7KpV21Rw9TfGh32Nd7HcLm92Qp3XvFt5

volumes:
  mysql_data: