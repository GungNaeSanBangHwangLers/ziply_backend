name: Ziply Full CI/CD

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build All Services (Jar)
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 각 서비스별로 이미지를 빌드하고 푸시합니다.
      - name: Build and Push Images
        run: |
          # 분석 서비스
          docker build -t ${{ secrets.DOCKER_USERNAME }}/analysis-service:latest ./analysis
          docker push ${{ secrets.DOCKER_USERNAME }}/analysis-service:latest
          
          # 리뷰 서비스
          docker build -t ${{ secrets.DOCKER_USERNAME }}/review-service:latest ./review
          docker push ${{ secrets.DOCKER_USERNAME }}/review-service:latest
          
          # 유저 서비스
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./user
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest
          
          # 인증 서비스
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest ./auth
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
          
          # 게이트웨이 서비스
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway:latest ./gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/gateway:latest
          

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/ziply
            
            # 모든 이미지 최신으로 땡겨오기
            docker-compose pull
            
            # 모든 서비스 재시작 (변경사항이 있는 것만 갈아끼워짐)
            docker-compose up -d
            
            # 찌꺼기 이미지 삭제
            docker image prune -f