name: Ziply Full CI/CD

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build All Services (Jar)
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Images
        run: |
          # 각 서비스 폴더명에 맞춰 빌드 (폴더명이 서비스명과 다를 경우 수정 필요)
          declare -A services=( ["analysis-service"]="analysis" ["review-service"]="review" ["user-service"]="user" ["auth-service"]="auth" ["gateway"]="gateway" )
          
          for service in "${!services[@]}"; do
            echo "Building $service..."
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./${services[$service]}
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.VM_USER }}/ziply
            cd /home/${{ secrets.VM_USER }}/ziply

            # 1. 서버 전용 .env 파일 생성 (비밀번호/키 주입)
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "KAKAO_API_KEY=${{ secrets.KAKAO_API_KEY }}" >> .env
            echo "BUS_API_KEY=${{ secrets.BUS_API_KEY }}" >> .env
            echo "ODSAY_API_KEY=${{ secrets.ODSAY_API_KEY }}" >> .env
            echo "SEOUL_TRAFFIC_API_KEY=${{ secrets.SEOUL_TRAFFIC_API_KEY }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env


            # 2. 최신 이미지 가져오기 및 컨테이너 교체
            docker-compose pull
            docker-compose up -d
            
            # 3. 안 쓰는 이미지(dangling) 삭제
            docker image prune -f