name: Ziply Full CI/CD

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 1. 테스트 실행 (여기서 실패하면 배포 중단)
      - name: Run tests with JaCoCo
        run: ./gradlew clean test jacocoTestReport --no-daemon

      # 2. 전 서비스 빌드 (분석 서비스 포함)
      - name: Build All Services
        run: ./gradlew build -x test # 테스트는 위에서 했으므로 생략하고 빌드만

      # 3. Azure ACR 로그인
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. 분석 서비스(Analysis) 이미지 빌드 및 푸시
      # (다른 서비스도 필요하면 여기에 추가 가능)
      - name: Build and Push Analysis Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/analysis-service:latest ./analysis
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/analysis-service:latest

      # 5. Azure VM 배포 (SSH 접속)
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/ziply
            docker compose pull analysis-service
            docker compose up -d analysis-service
            docker image prune -f # 안쓰는 이미지 정리